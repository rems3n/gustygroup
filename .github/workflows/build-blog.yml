name: Build blog

# Regenerates the static HTML under cred/ whenever CMS content or the templates change.
#
# No infinite loop: this workflow triggers only on the SOURCE paths below, while it
# commits only generated output (cred/blog/*.html, cred/blog.html, cred/resources.html,
# cred/sitemap.xml) — none of which appear in the trigger list.

on:
  push:
    branches: [master]
    paths:
      - 'cred/blog/posts/**'
      - 'cred/resources/**'
      - 'cred/authors/**'
      - 'cred/media/**'
      - 'templates/**'
      - 'scripts/build-blog.mjs'
      - 'package.json'
      - '.github/workflows/build-blog.yml'
  workflow_dispatch:

concurrency:
  group: build-blog
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: node scripts/build-blog.mjs

      - name: Commit generated pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cred/blog/*.html cred/blog.html cred/resources.html cred/sitemap.xml
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Rebuild blog from content"
            git push
          fi
