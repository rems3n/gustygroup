<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="styles.css">
<style>html,body{margin:0}
.tile{width:1280px;height:854px;display:flex}
.main{width:75%;background:var(--olive);display:flex;align-items:center;justify-content:center}
.wm{font-family:var(--font-display);font-weight:400;color:var(--paper);text-align:center;line-height:0.95}
.a{display:block;font-size:150px;letter-spacing:0.12em}
.b{display:block;font-size:92px;letter-spacing:0.2em}
.strip{width:25%;display:flex;flex-direction:column}
.strip>div{flex:1}</style></head>
<body>
<div class="tile">
  <div class="main"><div class="wm"><span class="a">GUSTY</span><span class="b">GROUP</span></div></div>
  <div class="strip">
    <div style="background:var(--mist)"></div>
    <div style="background:var(--oxblood)"></div>
    <div style="background:var(--olive-deep)"></div>
    <div style="background:var(--ink)"></div>
  </div>
</div>
</body></html>
