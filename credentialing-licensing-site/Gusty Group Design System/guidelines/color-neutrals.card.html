<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Ink & Paper" subtitle="Text tones and warm/cool surfaces" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--paper);display:flex}
.sw{flex:1;height:150px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
.n{font-size:12px;font-weight:600}.h{font-size:11px;opacity:.7;font-family:var(--font-mono)}
.dk{color:#fff}.lt{color:var(--ink);border-right:1px solid var(--rule)}</style></head>
<body>
<div class="sw dk" style="background:var(--ink)"><div class="n">Ink</div><div class="h">#1A1A17</div></div>
<div class="sw dk" style="background:var(--ink-soft)"><div class="n">Ink Soft</div><div class="h">#33332E</div></div>
<div class="sw dk" style="background:var(--ink-dim)"><div class="n">Ink Dim</div><div class="h">#5A5A52</div></div>
<div class="sw lt" style="background:var(--stone)"><div class="n">Stone</div><div class="h">#E8E6DC</div></div>
<div class="sw lt" style="background:var(--mist)"><div class="n">Mist</div><div class="h">#EEF0F3</div></div>
<div class="sw lt" style="background:var(--paper)"><div class="n">Paper</div><div class="h">#FFFFFF</div></div>
</body></html>
