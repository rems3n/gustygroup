<!-- @dsCard group="Brand" viewport="700x150" name="Links & selection" subtitle="Oxblood underline; hover inverts to oxblood fill" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:28px;background:var(--paper);font-family:var(--font-body);font-size:17px;line-height:1.7;color:var(--ink)}
a{color:var(--oxblood);text-decoration:underline;text-underline-offset:3px;text-decoration-thickness:1px;transition:background .15s,color .15s}
a:hover{background:var(--oxblood);color:var(--paper);text-decoration:none}
::selection{background:var(--oxblood);color:var(--paper)}
.sel{background:var(--oxblood);color:var(--paper)}</style></head>
<body>
Most consultants leave behind a deck. <a href="#">Gusty Group leaves behind systems</a> — try hovering. Text can be <span class="sel">selected in oxblood</span> too.
</body></html>
