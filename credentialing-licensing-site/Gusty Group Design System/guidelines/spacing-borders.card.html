<!-- @dsCard group="Spacing" viewport="700x150" name="Borders, rules & radius" subtitle="Hairline rules · 1px ink · 4px card radius" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px;background:var(--paper);font-family:var(--font-body);display:flex;gap:24px;align-items:center}
.demo{flex:1}.lbl{font-size:11px;color:var(--ink-dim);margin-top:8px;font-family:var(--font-mono)}
.hair{border-bottom:1px solid var(--rule)}.strong{border-bottom:1px solid var(--ink)}
.card{border:1px solid rgba(26,26,23,0.12);border-radius:4px;height:56px;background:var(--paper)}</style></head>
<body>
<div class="demo"><div class="hair" style="height:20px"></div><div class="lbl">1px --rule (hairline)</div></div>
<div class="demo"><div class="strong" style="height:20px"></div><div class="lbl">1px --ink (strong)</div></div>
<div class="demo"><div class="card"></div><div class="lbl">card · radius 4px · 12% ink border</div></div>
</body></html>
